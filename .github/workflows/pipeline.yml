name: ShopFlow Daily Pipeline

on:
  schedule:
    # Runs every day at 06:00 UTC (7am WAT — Abuja time)
    - cron: "0 6 * * *"

  # Also allows manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode: daily (incremental) or full (historical reload)"
        required: false
        default: "daily"
        type: choice
        options:
          - daily
          - full

jobs:
  run-pipeline:
    name: Ingest → Transform → Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

    steps:
      # ── 1. Checkout code ───────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install Python packages
        run: pip install -r requirements.txt

      # ── 4. Authenticate with Google Cloud ─────────────────────────────────
      # The service account key is stored as a GitHub secret (JSON string)
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      # ── 5. Run Python ingestion ───────────────────────────────────────────
      - name: Run data ingestion
        run: |
          MODE="${{ github.event.inputs.mode || 'daily' }}"
          echo "Running pipeline in $MODE mode..."
          python ingestion/generate_and_load.py --mode $MODE

      # ── 6. Set up dbt profile ─────────────────────────────────────────────
      # Creates the profiles.yml in the default dbt location
      - name: Configure dbt profile
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          shopflow:
            target: prod
            outputs:
              prod:
                type: bigquery
                method: service-account-json
                project: ${{ secrets.GCP_PROJECT_ID }}
                dataset: shopflow_marts
                location: US
                keyfile_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
                threads: 4
                timeout_seconds: 300
          EOF

      # ── 7. Run dbt models ─────────────────────────────────────────────────
      - name: Run dbt transformations
        working-directory: dbt_project
        run: |
          dbt deps
          dbt run --target prod

      # ── 8. Run dbt tests ──────────────────────────────────────────────────
      - name: Run dbt data quality tests
        working-directory: dbt_project
        run: dbt test --target prod

      # ── 9. Generate dbt docs (optional, good for portfolio) ───────────────
      - name: Generate dbt documentation
        working-directory: dbt_project
        run: dbt docs generate --target prod

      # ── 10. Notify on failure ─────────────────────────────────────────────
      - name: Pipeline status summary
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ ShopFlow pipeline completed successfully — $(date -u)"
          else
            echo "❌ ShopFlow pipeline FAILED — $(date -u)"
            exit 1
          fi
